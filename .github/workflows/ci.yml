name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Job 1: Lint
  # ──────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run ruff (lint)
        run: uv run ruff check app/ tests/

      - name: Run ruff (format check)
        run: uv run ruff format --check app/ tests/

      - name: Run mypy (type check)
        run: uv run mypy app/

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 2: Test
  # ──────────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install all dependencies
        run: uv sync --group dev

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=83 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 3: Test (PostgreSQL)
  # ──────────────────────────────────────────────────────────────────────────────
  test-postgres:
    name: Test (PostgreSQL)
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: miza_test
          POSTGRES_PASSWORD: miza_test
          POSTGRES_DB: miza_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U miza_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install all dependencies
        run: uv sync --group dev

      - name: Run PostgreSQL integration tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://miza_test:miza_test@localhost:5432/miza_test
        run: uv run pytest tests/ -m postgres -v --no-cov

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 4: Docker Build
  # ──────────────────────────────────────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
